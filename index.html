<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>宝可梦图鉴 (Pokedex)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
        .pokemon-card {
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .pokemon-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }
        .type-normal { background-color: #A8A878; }
        .type-fire { background-color: #F08030; }
        .type-water { background-color: #6890F0; }
        .type-grass { background-color: #78C850; }
        .type-electric { background-color: #F8D030; }
        .type-ice { background-color: #98D8D8; }
        .type-fighting { background-color: #C03028; }
        .type-poison { background-color: #A040A0; }
        .type-ground { background-color: #E0C068; }
        .type-flying { background-color: #A890F0; }
        .type-psychic { background-color: #F85888; }
        .type-bug { background-color: #A8B820; }
        .type-rock { background-color: #B8A038; }
        .type-ghost { background-color: #705898; }
        .type-dragon { background-color: #7038F8; }
        .type-dark { background-color: #705848; }
        .type-steel { background-color: #B8B8D0; }
        .type-fairy { background-color: #EE99AC; }

        .loading-spinner {
            border: 4px solid rgba(0, 0, 0, 0.1);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border-left-color: #3b82f6;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">
    <div id="app" class="container mx-auto px-4 py-8">
        <!-- Header -->
        <header class="text-center mb-12">
            <h1 class="text-4xl font-bold text-red-600 mb-4">宝可梦图鉴</h1>
            <p class="text-gray-600">探索神奇宝贝的世界！</p>
        </header>

        <!-- Search and Filter -->
        <div class="bg-white rounded-xl shadow-md p-6 mb-8 flex flex-col md:flex-row gap-4 items-center justify-between">
            <div class="relative w-full md:w-96">
                <input 
                    v-model="searchQuery" 
                    type="text" 
                    placeholder="搜索宝可梦名字或编号..." 
                    class="w-full pl-10 pr-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-red-500"
                >
                <svg class="absolute left-3 top-2.5 h-5 w-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                </svg>
            </div>
            
            <div class="flex flex-wrap gap-2 justify-center">
                <button 
                    @click="selectedType = 'all'"
                    :class="selectedType === 'all' ? 'bg-red-500 text-white' : 'bg-gray-200 text-gray-700 hover:bg-gray-300'"
                    class="px-4 py-1 rounded-full text-sm font-medium transition-colors"
                >
                    全部
                </button>
                <button 
                    v-for="type in pokemonTypes" 
                    :key="type.name"
                    @click="selectedType = type.name"
                    :class="[
                        selectedType === type.name ? 'ring-2 ring-offset-2 ring-red-500 shadow-md' : '',
                        `type-${type.name}`
                    ]"
                    class="px-3 py-1 rounded-full text-xs font-bold text-white uppercase tracking-wider"
                >
                    {{ type.displayName }}
                </button>
            </div>
        </div>

        <!-- Pokemon Grid -->
        <div v-if="loading" class="flex flex-col items-center justify-center py-20">
            <div class="loading-spinner mb-4"></div>
            <p class="text-gray-500">正在召唤宝可梦...</p>
        </div>

        <div v-else-if="filteredPokemon.length === 0" class="text-center py-20 text-gray-500">
            <p class="text-xl">没找到符合条件的宝可梦呢...</p>
        </div>

        <div v-else class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-6">
            <div 
                v-for="pokemon in filteredPokemon" 
                :key="pokemon.id"
                class="pokemon-card bg-white rounded-2xl overflow-hidden shadow-sm hover:shadow-xl cursor-pointer"
            >
                <div class="bg-gray-50 p-6 flex justify-center items-center relative h-48">
                    <span class="absolute top-3 left-3 text-gray-300 font-bold text-lg">#{{ String(pokemon.id).padStart(3, '0') }}</span>
                    <img 
                        :src="pokemon.image" 
                        :alt="pokemon.name"
                        class="w-32 h-32 object-contain"
                        loading="lazy"
                    >
                </div>
                <div class="p-4">
                    <h2 class="text-xl font-bold text-gray-800 mb-1 capitalize">{{ pokemon.chineseName || pokemon.name }}</h2>
                    <p class="text-xs text-gray-400 mb-2 uppercase tracking-wide">{{ pokemon.name }}</p>
                    <div class="flex gap-2">
                        <span 
                            v-for="type in pokemon.types" 
                            :key="type"
                            :class="`type-${type}`"
                            class="px-2 py-0.5 rounded text-[10px] font-bold text-white uppercase"
                        >
                            {{ typeTranslations[type] || type }}
                        </span>
                    </div>
                    <div class="mt-4 flex justify-between text-xs text-gray-400">
                        <span>身高: {{ pokemon.height / 10 }}m</span>
                        <span>体重: {{ pokemon.weight / 10 }}kg</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const { createApp, ref, onMounted, computed } = Vue;

        createApp({
            setup() {
                const pokemonList = ref([]);
                const loading = ref(true);
                const searchQuery = ref('');
                const selectedType = ref('all');

                // 预置第一世代 151 只宝可梦的中文名称，确保加载速度和准确性
                const chineseNames = {
                    1: "妙蛙种子", 2: "妙蛙草", 3: "妙蛙花", 4: "小火龙", 5: "火恐龙", 6: "喷火龙", 7: "杰尼龟", 8: "卡咪龟", 9: "水箭龟", 10: "绿毛虫",
                    11: "铁甲蛹", 12: "巴大蝶", 13: "独角虫", 14: "铁壳蛹", 15: "大针蜂", 16: "波波", 17: "比比鸟", 18: "大比鸟", 19: "小拉达", 20: "拉达",
                    21: "烈雀", 22: "大嘴雀", 23: "阿柏蛇", 24: "阿柏怪", 25: "皮卡丘", 26: "雷丘", 27: "穿山鼠", 28: "穿山王", 29: "尼多兰", 30: "尼多娜",
                    31: "尼多后", 32: "尼多朗", 33: "尼多力诺", 34: "尼多王", 35: "皮皮", 36: "皮可西", 37: "六尾", 38: "九尾", 39: "胖丁", 40: "胖可丁",
                    41: "超音蝠", 42: "大嘴蝠", 43: "走路草", 44: "臭臭花", 45: "霸王花", 46: "派拉斯", 47: "派拉斯特", 48: "毛球", 49: "摩鲁蛾", 50: "地鼠",
                    51: "三地鼠", 52: "喵喵", 53: "猫老大", 54: "可达鸭", 55: "哥达鸭", 56: "猴怪", 57: "火暴猴", 58: "卡蒂狗", 59: "风速狗", 60: "蚊香蝌蚪",
                    61: "蚊香君", 62: "蚊香泳士", 63: "凯西", 64: "勇基拉", 65: "胡地", 66: "腕力", 67: "豪力", 68: "怪力", 69: "喇叭芽", 70: "口呆花",
                    71: "大食花", 72: "玛瑙水母", 73: "毒刺水母", 74: "小拳石", 75: "隆隆石", 76: "隆隆岩", 77: "小火马", 78: "烈焰马", 79: "呆呆兽", 80: "呆壳兽",
                    81: "小磁怪", 82: "三合一磁怪", 83: "大葱鸭", 84: "嘟嘟", 85: "嘟嘟利", 86: "小海狮", 87: "白海狮", 88: "臭泥", 89: "臭臭泥", 90: "大舌贝",
                    91: "刺甲贝", 92: "鬼斯", 93: "鬼斯通", 94: "耿鬼", 95: "大岩蛇", 96: "催眠貘", 97: "引梦貘人", 98: "大钳蟹", 99: "巨钳蟹", 100: "雷电球",
                    101: "顽皮雷弹", 102: "蛋蛋", 103: "椰蛋树", 104: "卡拉卡拉", 105: "嘎拉嘎拉", 106: "飞腿郎", 107: "快拳郎", 108: "大舌头", 109: "瓦斯弹", 110: "双弹瓦斯",
                    111: "独角犀牛", 112: "钻角犀兽", 113: "吉利蛋", 114: "蔓藤怪", 115: "袋兽", 116: "墨海马", 117: "海刺龙", 118: "角金鱼", 119: "金鱼王", 120: "海星星",
                    121: "宝石海星", 122: "魔墙人偶", 123: "飞天螳螂", 124: "迷唇姐", 125: "电击兽", 126: "鸭嘴火兽", 127: "凯罗斯", 128: "肯泰罗", 129: "鲤鱼王", 130: "暴鲤龙",
                    131: "拉普拉斯", 132: "百变怪", 133: "伊布", 134: "水伊布", 135: "雷伊布", 136: "火伊布", 137: "多边兽", 138: "菊石兽", 139: "多刺菊石兽", 140: "化石盔",
                    141: "镰刀盔", 142: "化石翼龙", 143: "卡比兽", 144: "急冻鸟", 145: "闪电鸟", 146: "火焰鸟", 147: "迷你龙", 148: "哈克龙", 149: "快龙", 150: "超梦", 151: "梦幻"
                };

                const typeTranslations = {
                    normal: '普通', fire: '火', water: '水', grass: '草',
                    electric: '电', ice: '冰', fighting: '格斗', poison: '毒',
                    ground: '地面', flying: '飞行', psychic: '超能力', bug: '虫',
                    rock: '岩石', ghost: '幽灵', dragon: '龙', dark: '恶',
                    steel: '钢', fairy: '妖精'
                };

                const pokemonTypes = Object.entries(typeTranslations).map(([name, displayName]) => ({
                    name, displayName
                }));

                const fetchPokemon = async () => {
                    try {
                        loading.value = true;
                        // Fetch first 151 Pokemon
                        const response = await fetch('https://pokeapi.co/api/v2/pokemon?limit=151');
                        const data = await response.json();
                        
                        const detailedPromises = data.results.map(async (p) => {
                            const res = await fetch(p.url);
                            const details = await res.json();
                            
                            return {
                                id: details.id,
                                name: details.name,
                                chineseName: chineseNames[details.id] || details.name,
                                image: details.sprites.other['official-artwork'].front_default,
                                types: details.types.map(t => t.type.name),
                                height: details.height,
                                weight: details.weight
                            };
                        });

                        pokemonList.value = await Promise.all(detailedPromises);
                    } catch (error) {
                        console.error('Error fetching pokemon:', error);
                    } finally {
                        loading.value = false;
                    }
                };

                const filteredPokemon = computed(() => {
                    return pokemonList.value.filter(pokemon => {
                        const searchLower = searchQuery.value.toLowerCase();
                        const matchesSearch = 
                            pokemon.name.toLowerCase().includes(searchLower) || 
                            (pokemon.chineseName && pokemon.chineseName.includes(searchQuery.value)) ||
                            String(pokemon.id).includes(searchQuery.value);
                        const matchesType = selectedType.value === 'all' || pokemon.types.includes(selectedType.value);
                        return matchesSearch && matchesType;
                    });
                });

                onMounted(fetchPokemon);

                return {
                    pokemonList,
                    loading,
                    searchQuery,
                    selectedType,
                    pokemonTypes,
                    typeTranslations,
                    filteredPokemon
                };
            }
        }).mount('#app');
    </script>
</body>
</html>
